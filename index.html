<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShadowMarket</title>
  <meta name="description" content="Visual micro-empires grown from everyday constraints." />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div id="app" class="game-shell">
    <!-- FULLSCREEN MAP -->
    <div id="stage" class="stage">
      <canvas id="empire-map" aria-label="Empire map"></canvas>

      <!-- Top chrome -->
      <div class="hud-top">
        <div class="minimap-wrap">
          <canvas id="minimap" width="140" height="100"></canvas>
        </div>
        <div class="title-banner">
          <span class="title-icon">◎</span>
          <span id="empire-title">ShadowMarket</span>
          <button type="button" id="btn-settings" class="icon-btn" title="Reset / settings">⚙</button>
        </div>
        <div class="hud-top-right">
          <button type="button" class="icon-btn" id="btn-blueprints-hud" title="Blueprints" disabled>◈</button>
          <button type="button" class="icon-btn" id="btn-seal-copy" title="Copy Empire Seal" disabled>⇪</button>
        </div>
      </div>

      <!-- Side inspect -->
      <aside id="inspect" class="inspect" hidden>
        <button type="button" class="inspect-close" id="inspect-close">×</button>
        <div id="inspect-body"></div>
        <div id="inspect-actions" class="inspect-actions"></div>
      </aside>

      <!-- Bottom resource bars -->
      <div class="hud-resources" id="hud-resources"></div>

      <!-- Bottom toolbar -->
      <div class="hud-toolbar">
        <button type="button" id="btn-sim-start" class="tool primary" title="Run simulation">▶ Run</button>
        <button type="button" id="btn-sim-pause" class="tool" title="Pause">⏸</button>
        <div class="speed tool-group" role="group" aria-label="Speed">
          <button type="button" data-speed="1">1×</button>
          <button type="button" data-speed="10" class="active">10×</button>
          <button type="button" data-speed="60">60×</button>
        </div>
        <button type="button" id="btn-new-empire" class="tool" title="New empire">＋</button>
        <button type="button" id="btn-export-md" class="tool" title="Export MD" disabled>MD</button>
        <span id="sim-meta" class="sim-chip">Idle</span>
      </div>

      <!-- Floating event toast strip -->
      <div id="event-ticker" class="event-ticker" hidden></div>
    </div>

    <!-- INTAKE OVERLAY -->
    <div id="intake-overlay" class="overlay">
      <div class="overlay-card">
        <p class="kicker">ShadowMarket</p>
        <h1>Your constraint.<br />Your empire floor.</h1>
        <p class="lede">Name a real limit. We build a visual micro-empire that runs on it — not a wall of text.</p>
        <label class="field">
          <span>Constraint</span>
          <textarea id="constraint-input" rows="2" placeholder="limited garage space…"></textarea>
        </label>
        <div id="preset-list" class="chips"></div>
        <button type="button" id="btn-found" class="primary wide">Enter the floor</button>
      </div>
    </div>

    <!-- BLUEPRINTS DRAWER -->
    <div id="bp-drawer" class="drawer" hidden>
      <div class="drawer-panel">
        <header>
          <h2>Blueprints</h2>
          <div class="actions">
            <button type="button" id="btn-export-json">JSON</button>
            <button type="button" id="btn-print">Print</button>
            <button type="button" id="bp-close">Close</button>
          </div>
        </header>
        <div id="blueprint-list" class="blueprint-grid"></div>
      </div>
    </div>

    <!-- SETTINGS / SEAL -->
    <div id="settings-modal" class="overlay" hidden>
      <div class="overlay-card slim">
        <h2>Ops desk</h2>
        <label class="field">
          <span>Import rival Empire Seal</span>
          <input id="seal-input" type="text" placeholder="Paste seal…" autocomplete="off" />
        </label>
        <button type="button" id="btn-seal-import" class="primary wide">Import rival</button>
        <button type="button" id="btn-reset" class="danger wide">Wipe device state</button>
        <button type="button" id="settings-close" class="wide">Close</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast" hidden role="status"></div>
  <script type="module" src="js/main.js"></script>
</body>
</html>
